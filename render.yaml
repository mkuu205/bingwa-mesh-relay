services:
  - type: web
    name: bingwa-mesh-relay
    env: node
    plan: starter
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm run prisma:deploy && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: bingwa-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: bingwa-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true

databases:
  - name: bingwa-db
    plan: free

redis:
  - name: bingwa-redis
    plan: free
